services:
  - type: web
    name: used-bike-price-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ready
    envVars:
      - key: API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
